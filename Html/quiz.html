<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzie - Quiz Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #quiz {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        .flash-red {
            animation: flashRed 0.5s ease-in-out;
        }

        @keyframes flashRed {
            0%, 100% {
                background-color: white;
            }
            50% {
                background-color: #ffebee;
            }
        }

        /* Intro Screen */
        .intro-screen {
            text-align: center;
        }

        .intro-screen h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        .intro-screen p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Question Screen */
        .question-screen {
            animation: slideIn 0.5s ease-out;
        }

        .question-header {
            margin-bottom: 30px;
        }

        .question-header h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .progress-bar {
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Answer Options */
        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .answer-btn {
            padding: 15px 20px;
            background-color: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-weight: 500;
        }

        .answer-btn:hover {
            background-color: #efefef;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .answer-btn:active {
            background-color: #e8e8e8;
        }

        .answer-btn.correct {
            background-color: #c8e6c9;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .answer-btn.incorrect {
            background-color: #ffcdd2;
            border-color: #f44336;
            color: #c62828;
        }

        /* Answer Input */
        .answer-input {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        #answerInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        #answerInput:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Feedback */
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .green-text {
            background-color: #c8e6c9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .red-text {
            background-color: #ffcdd2;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        /* Results Screen */
        .results-screen {
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        .results-screen h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        .message {
            color: #667eea;
            font-size: 1.3rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .score {
            margin-bottom: 40px;
        }

        .score-text {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .score-percentage {
            font-size: 3.5rem;
            color: white;
            font-weight: bold;
        }

        .score-details {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: #f5f5f5;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background-color: #efefef;
            border-color: #667eea;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #quiz {
                padding: 25px;
            }

            .intro-screen h1,
            .results-screen h1 {
                font-size: 1.8rem;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .answer-btn {
                font-size: 0.95rem;
                padding: 12px 15px;
            }

            .score-circle {
                width: 120px;
                height: 120px;
            }

            .score-percentage {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="quiz">
        <!-- Quiz content will be dynamically loaded here -->
    </div>

    <!-- Compiled JavaScript will be included here -->
    <script src="../dist/app.js"></script>
</body>
</html>
